                        content: `Masa remaja adalah masa di mana kita paling sering membandingkan diri dengan orang lain. Melihat teman yang lebih pintar, lebih menarik, atau lebih populer seringkali membuat kita merasa 'insecure' atau tidak aman.

Alih-alih fokus pada apa yang tidak kamu miliki, mulailah berterima kasih atas apa yang ada padamu. Ubah rasa iri menjadi inspirasi. Kamu unik, dan dunia membutuhkan keunikanmu, bukan versi tiruan dari orang lain. Tarik napas dalam-dalam, hargai prosesmu, dan teruslah melangkah maju.`

Banyak tokoh sukses dunia yang pernah mengalami kegagalan akademis. Nilai hanyalah angka yang mengukur pemahamanmu pada satu waktu tertentu terhadap satu mata pelajaran tertentu. Ia tidak mengukur kreativitasmu, empatimu, atau ketangguhanmu.

Jangan takut untuk melepaskan teman yang beracun. Lebih baik memiliki sedikit teman tapi tulus, daripada banyak teman tapi membuatmu kehilangan dirimu sendiri. Mulailah mencari komunitas yang sejalan dengan hobi dan nilai-nilai positifmu.`

Namun, kamu harus selalu ingat: media sosial adalah etalase, bukan gudang. Orang hanya memamerkan momen-momen terbaik (highlight reel) mereka, bukan perjuangan, air mata, atau kegagalan yang terjadi di baliknya.

Awalnya mungkin terasa canggung atau takut dijauhi. Tapi percayalah, mereka yang menjauhimu karena kamu menolak hal negatif, memang bukan teman yang layak dipertahankan.`

                        content: `Cinta monyet atau patah hati pertama rasanya seperti akhir dunia. Dada terasa sesak, lagu-lagu sedih terasa sangat relate, dan kamu merasa tidak akan pernah bisa menyukai orang lain lagi.

Validasi perasaanmu. Menangislah. Kecewa itu wajar. Namun, ketahuilah bahwa waktu adalah penyembuh yang luar biasa. Sakit hati ini sedang mengajarkanmu tentang apa yang kamu inginkan, apa yang tidak kamu inginkan, dan bagaimana cara menjadi lebih kuat.

Jadikan momen ini untuk kembali fokus pada dirimu. Perbaiki nilai, tekuni hobi, dan nikmati waktu bersama sahabat. Suatu hari nanti, kamu akan melihat ke belakang dan tersenyum menyadari betapa jauhnya kamu telah bertumbuh.`

Prokrastinasi seringkali bukan karena malas, tapi karena otakmu menghindari rasa tidak nyaman dari tugas yang terlihat besar dan sulit. Cara terbaik mengalahkannya adalah dengan "Aturan 5 Menit".

Standar kecantikan itu fana dan terus berubah-ubah setiap dekade. Menghabiskan energimu untuk membenci genetikmu adalah pertempuran yang tidak akan pernah kamu menangkan.

Ubahlah fokusmu. Rawatlah tubuhmu karena kamu mencintainya (dengan makan sehat dan olahraga), bukan karena kamu membencinya. Keunikan fisikmu adalah sejarah dan warisan keluargamu. Berjalanlah dengan tegak, karena kepercayaan diri jauh lebih memukau daripada kesempurnaan fisik.`

                        content: `Menjadi korban perundungan (bullying) atau mendapat komentar jahat sangatlah melukai mental. Tapi ada satu rahasia besar yang harus kamu tahu: komentar jahat mereka mencerminkan siapa mereka, bukan siapa kamu.

Orang yang bahagia dan memiliki hidup yang berarti tidak punya waktu untuk mengurus atau menyakiti orang lain. Mereka yang mem-bully biasanya memiliki luka batin, rasa tidak aman (insecure), atau masalah di rumahnya.

Jangan balas dendam, karena itu hanya akan membuatmu sama seperti mereka. Laporkan pada pihak berwenang jika sudah kelewatan. Lindungi energimu, dan kelilingi dirimu dengan orang-orang yang mendukungmu.`

Kenyataannya, kemungkinan besar setengah dari teman sekelasmu juga sama bingungnya, mereka hanya sama-sama takut sepertimu. Bertanya bukanlah tanda kebodohan, melainkan tanda bahwa kamu memperhatikan dan ingin mengerti.

Namun, bermain game atau nongkrong tanpa batas juga akan merusak masa depanmu. Kuncinya adalah 'Work hard, play hard'. Buatlah jadwal yang realistis.

Gunakan teknik Pomodoro saat belajar (25 menit fokus, 5 menit istirahat). Jadikan waktu bermainmu sebagai 'reward' atau hadiah setelah kamu berhasil menyelesaikan tugas sekolahmu. Dengan begitu, kamu bisa main dengan tenang tanpa dihantui rasa bersalah.`

Cobalah berbagai hal. Ikuti kelas bahasa, pelajari coding dasar, ikut klub teater, atau coba menulis cerpen. Dari mencoba banyak hal, kamu akan menemukan mana yang membuat matamu berbinar dan mana yang membosankan. Teruslah bereksplorasi!`

Jangan ragu untuk berbicara dengan konselor sekolah, orang tua, atau psikolog jika bebanmu terasa terlalu berat. Mengakui bahwa kamu butuh bantuan adalah langkah paling berani yang bisa dilakukan seseorang.`

                theme: "from-emerald-600 to-teal-900",

Fase ini memang tidak nyaman. Kecemasan akan masa depan, karier, dan tujuan hidup sering menghantui di malam hari. Namun, ini adalah tanda bahwa kesadaranmu sedang berkembang. Kamu mulai mempertanyakan apa yang benar-benar penting bagimu, bukan sekadar mengikuti ekspektasi masyarakat.

Stoisisme mengajarkan kita untuk membedakan antara apa yang bisa kita kendalikan (pikiran, tindakan, dan respons kita) dan apa yang tidak bisa kita kendalikan (opini orang lain, masa lalu, dan kejadian eksternal).

Ketika kita belajar melepaskan obsesi untuk mengendalikan segalanya, kita akan menemukan kedamaian yang luar biasa. Lakukan bagianmu sebaik mungkin, lalu ikhlaskan hasilnya. Belajarlah mengalir bersama kehidupan, bukan melawannya.`

                        content: `Budaya 'hustle' sering membuat kita merasa bersalah jika kita beristirahat. Kita memforsir diri untuk bekerja keras tanpa henti demi karier atau keluarga, hingga akhirnya mencapai titik 'burnout'—kelelahan fisik, mental, dan emosional yang ekstrem.

Tubuh dan pikiranmu bukanlah mesin. Ketika mereka mengirimkan sinyal kelelahan melalui insomnia, mudah marah, atau kehilangan motivasi, dengarkanlah. Mengambil jeda untuk beristirahat bukan berarti kamu lemah atau menyerah.

Istirahat adalah bentuk penghormatan terhadap dirimu sendiri. Mulailah menetapkan batasan yang jelas antara waktu kerja dan waktu pribadi. Cari kembali hobi kecil yang membuatmu tersenyum. Karier itu penting, tapi kesehatan fisik dan mentalmu adalah aset yang paling berharga.`

                        excerpt: "Sendiri bukan berarti kesepian. Belajarlah menjadi sahabat terbaik bagi dirimu sendiri.",
                        content: `Semakin bertambah usia, lingkaran pertemanan cenderung semakin mengecil. Akhir pekan yang dulu dipenuhi dengan jadwal nongkrong, perlahan berganti menjadi momen beres-beres rumah atau sekadar tiduran di kamar. Ini bukan berarti kamu kehilangan pesona sosialmu, ini adalah siklus alami pendewasaan.

Ada perbedaan besar antara 'lonely' (kesepian) dan 'solitude' (kesendirian yang menenangkan). Belajarlah mengubah rasa sepi menjadi momen untuk mengisi ulang energi (recharge).

                        content: `Di usia 20-an akhir atau 30-an, banyak yang tiba-tiba sadar: "Ini bukan hidup yang aku inginkan." Mungkin kamu merasa salah mengambil jurusan kuliah, atau terjebak dalam karier yang menghisap jiwamu.

                        content: `Mengiyakan ajakan teman padahal kamu ingin tidur. Mengambil pekerjaan rekan kerja karena sungkan menolak. Menjadi 'people pleaser' mungkin membuatmu disukai, tapi itu akan membunuh batinmu perlahan.

Mengorbankan batasan dirimu demi kenyamanan orang lain adalah bentuk pengkhianatan pada diri sendiri. Orang lain akan terus meminta, selama kamu terus memberi.

Belajarlah berkata "Tidak, maaf aku sedang tidak bisa" tanpa perlu memberikan alasan atau penjelasan yang panjang lebar. Orang yang benar-benar menghargaimu akan mengerti batasanmu. Mereka yang marah ketika kamu menetapkan batas, adalah orang yang selama ini mengambil keuntungan darimu.`

        window.getSaranHTML = function() {
            // Meloop data saran yang didapat dari Database Cloud
            const suggestionsHTML = window.suggestionsList.map(s => `

            return `

                        <form id="saranForm" onsubmit="window.submitSuggestion(event)" class="bg-black/60 backdrop-blur-md rounded-xl sm:rounded-2xl p-4 sm:p-6 border border-white/10 mb-8 sm:mb-10 shadow-xl sm:shadow-2xl">

        // --- RENDER UTAMA ---
        window.renderApp = function() {
            const appContainer = document.getElementById('app');
            
            if (window.currentView === 'home') {
                appContainer.innerHTML = getHomeHTML();
            } else if (window.currentView === 'category') {
                appContainer.innerHTML = getCategoryHTML();
            } else if (window.currentView === 'article') {
                appContainer.innerHTML = getArticleHTML();
            } else if (window.currentView === 'saran') {
                appContainer.innerHTML = window.getSaranHTML();
            }
            
            if(typeof feather !== 'undefined') {
                feather.replace();
            }
        }

        // Jalankan render PERTAMA KALI SECARA INSTAN!
        window.renderApp();

    <!-- SCRIPT 2: FIREBASE & KONEKSI AWAN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE SETUP ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // 1. MENDENGARKAN DATABASE SARAN
                const suggestionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'suggestions');
                onSnapshot(suggestionsRef, (snapshot) => {
                    window.suggestionsList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    window.suggestionsList.sort((a, b) => b.timestamp - a.timestamp);
                    if (window.currentView === 'saran') {
                        window.renderApp();
                    }
                }, (error) => console.error("Gagal mengambil saran:", error));

                // 2. MENDENGARKAN ARTIKEL BARU DARI CLOUD (SINKRONISASI INTERNET)
                const articlesRef = collection(db, 'artifacts', appId, 'public', 'data', 'articles');
                onSnapshot(articlesRef, (snapshot) => {
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === "added") {
                            const data = change.doc.data();
                            const cat = data.category; // contoh: 'remaja', 'dewasa'
                            if(window.motivationalData[cat]) {
                                // Mencegah artikel ganda
                                if(!window.motivationalData[cat].articles.find(a => a.id === change.doc.id)) {
                                    window.motivationalData[cat].articles.push({
                                        id: change.doc.id,
                                        title: data.title,
                                        icon: data.icon || "star",
                                        iconColor: data.iconColor || "text-white",
                                        excerpt: data.excerpt,
                                        content: data.content
                                    });
                                    // Refresh tampilan jika ada di dalam kategori terkait
                                    if(window.currentView === 'category' && window.selectedCategory === cat) {
                                        window.renderApp();
                                    }
                                }
                            }
                        }
                    });
                });
            }
        });

        // Submit Saran ke Database
        window.submitSuggestion = async function(event) {
            event.preventDefault();
            if (!currentUser) return;

            const name = document.getElementById('saranName').value;
            const address = document.getElementById('saranAddress').value;
            const text = document.getElementById('saranText').value;
            const btn = document.getElementById('saranSubmitBtn');
            const statusEl = document.getElementById('saranStatus');

            if(!name || !address || !text) return;

            btn.disabled = true;
            btn.innerHTML = "Mengirim...";
            statusEl.classList.add('hidden');

            try {
                const suggestionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'suggestions');
                await addDoc(suggestionsRef, {
                    name: name,
                    address: address,
                    text: text,
                    timestamp: Date.now(),
                    userId: currentUser.uid
                });
                document.getElementById('saranForm').reset();
                statusEl.classList.remove('hidden');
                setTimeout(() => statusEl.classList.add('hidden'), 3000);
            } catch (error) {
                console.error("Error: ", error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Kirim Saran";
            }
        };
    </script>
</body>
</html>
